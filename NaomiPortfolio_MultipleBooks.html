<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Books</title>
  <style>
    body { font-family: Arial; margin: 40px; line-height: 1.6; }
    .book { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; display: flex; align-items: center; }
    .book img { max-width: 100px; margin-right: 15px; }
  </style>
</head>
<body>
  <h1>Book List</h1>
  <div id="books-container"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $.getJSON("NaomiPortfolio_BookList.json", function(data) {
      data.forEach(book => {
        $("#books-container").append(`
          <div class="book">
            <img src="${book.thumbnail}" alt="${book.title}">
            <div>
              <h3>${book.title}</h3>
              <p>By: ${book.authors.join(", ")}</p>
              <p>${book.description}</p>
            </div>
          </div>
        `);
      });
    });
  </script>
</body>
</html>
