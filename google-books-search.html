<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Books Display</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
    .book { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    img { max-width: 150px; }
    nav ul { list-style-type: none; padding: 0; }
    nav li { display: inline; margin-right: 15px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="google-books-book.html">Single Book</a></li>
        <li><a href="google-books-search.html">Multiple Books</a></li>
      </ul>
    </nav>
  </header>

  <h1>Book List</h1>
  <div id="books-list"></div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $.getJSON("google-books-search.json", function(data) {
      data.items.forEach(function(book) {
        $("#books-list").append(
          "<div class='book'>" +
            "<h2>" + book.title + "</h2>" +
            "<p>By: " + book.authors.join(", ") + "</p>" +
            "<img src='" + book.thumbnail + "' alt='Book image'>" +
            "<p>" + book.description + "</p>" +
          "</div>"
        );
      });
    });
  </script>
</body>
</html>
