<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Book Display</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
    img { max-width: 200px; }
    nav ul { list-style-type: none; padding: 0; }
    nav li { display: inline; margin-right: 15px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="google-books-book.html">Single Book</a></li>
        <li><a href="google-books-search.html">Multiple Books</a></li>
      </ul>
    </nav>
  </header>

  <h1>Single Book Details</h1>
  <div id="book-container">
    <h2 id="book-title"></h2>
    <p id="book-authors"></p>
    <img id="book-thumbnail" src="" alt="Book Image">
    <p id="book-description"></p>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $.getJSON("google-books-book.json", function(data) {
      $("#book-title").text(data.title);
      $("#book-authors").text("By: " + data.authors.join(", "));
      $("#book-description").text(data.description);
      $("#book-thumbnail").attr("src", data.thumbnail);
    });
  </script>
</body>
</html>
