<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single Book Display</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
    img { max-width: 200px; }
  </style>
</head>
<body>
  <h1>Book Details</h1>
  <div id="book-container">
    <h2 id="book-title"></h2>
    <p id="book-authors"></p>
    <img id="book-thumbnail" src="" alt="Book Image">
    <p id="book-description"></p>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    // Get the book ID from the URL
    const params = new URLSearchParams(window.location.search);
    const bookId = params.get("id");

    $.getJSON("google-books.json", function(data) {
      const book = data.find(b => b.id === bookId);

      if (book) {
        $("#book-title").text(book.title);
        $("#book-authors").text("By: " + book.authors.join(", "));
        $("#book-description").text(book.description);
        $("#book-thumbnail").attr("src", book.thumbnail).attr("alt", book.title);
      } else {
        $("#book-container").html("<p>Book not found.</p>");
      }
    });
  </script>
</body>
</html>
